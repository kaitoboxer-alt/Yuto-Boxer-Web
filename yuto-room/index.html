<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>B.B.PW - Yuto's Room</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        .room-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 左右2分割 */
            grid-template-rows: 1fr 1fr;    /* 上下2分割（計4エリア） */
            height: 100vh; gap: 20px; padding: 20px; box-sizing: border-box;
            background: rgba(0,0,0,0.8); /* 少し暗めの部屋感 */
        }
        /* 左下：テキストエリア（ページの1/4） */
        .text-area {
            grid-column: 1 / 2; grid-row: 2 / 3;
            background: #fff; color: #333; padding: 15px;
            border: 2px solid #555; overflow-y: scroll; /* スクロール対応 */
            font-family: "serif"; white-space: pre-wrap; /* 改行維持 */
        }
        /* 右上・右下：イラスト/ムービー表示用（2点） */
        .display-slot {
            background: #111; border: 1px solid #444;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .display-slot img, .display-slot video {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }
    </style>
</head>
<body>

<div class="room-container">
    <div style="color:white;">
        <h1>Yuto's Room</h1>
        <p>Stay gold, keep boxing.</p>
    </div>

    <div class="display-slot">
        <img src="../03_gallery/y01.webp" alt="decoration 1">
    </div>

    <div class="text-area" id="yutoText">
        Loading journal...
    </div>

    <div class="display-slot">
        <video src="./assets/room_movie.mp4" controls muted loop style="width:100%;"></video>
    </div>
</div>

<script>
    // yuto.txtを読み込んで表示する（キャッシュ対策付き）
    const ts = new Date().getTime();
    fetch(`./yuto.txt?v=${ts}`)
        .then(response => response.text())
        .then(data => {
            document.getElementById('yutoText').innerText = data;
        });
</script>
</body>
</html>
