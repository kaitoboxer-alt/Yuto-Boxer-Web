<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>B.B.PW - Press Release</title>
    <style>
        body {
            /* 背景画像（既存のものを想定） */
            background: url('../../images/background.webp') no-repeat center center fixed;
            background-size: cover;
            margin: 0; font-family: "serif";
        }
        .newspaper-wrapper {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            padding: 20px;
        }
        .newspaper-page {
            width: 100%; max-width: 800px; background: #f9f7f1; padding: 40px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5); border: 1px solid #dcdcdc;
            color: #1a1a1a; position: relative;
        }
        .headline { font-size: 2.8em; font-weight: bold; text-align: center; border-bottom: 2px solid #000; margin: 20px 0; }
        .match-area { display: flex; justify-content: space-between; gap: 20px; margin: 30px 0; }
        .boxer-card { width: 30%; text-align: center; }
        .boxer-card img { width: 100%; border: 1px solid #000; padding: 3px; background: #fff; }
        .stats-table { width: 35%; border-collapse: collapse; font-size: 0.9em; }
        .stats-table td { border-bottom: 1px solid #ccc; padding: 8px; text-align: center; }
        .comment-box { border-top: 3px double #333; margin-top: 30px; padding-top: 15px; font-style: italic; }

        /* ナビゲーション */
        .nav-btn {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); color: white; border: none;
            padding: 20px; cursor: pointer; font-size: 24px; transition: 0.3s;
        }
        .nav-btn:hover { background: rgba(0,0,0,0.8); }
        .btn-prev { left: 10px; }
        .btn-next { right: 10px; }
    </style>
</head>
<body>

<button class="nav-btn btn-prev" onclick="changePage(-1)">〈</button>
<button class="nav-btn btn-next" onclick="changePage(1)">〉</button>

<div class="newspaper-wrapper">
    <article class="newspaper-page" id="paper">
        </article>
</div>

<script>
    let pressData = [];
    let currentIndex = 0;
    const ts = new Date().getTime(); // キャッシュ破棄用

    // 1. JSON読み込み
    fetch(`./press_data.json?v=${ts}`)
        .then(res => res.json())
        .then(data => {
            pressData = data;
            renderPage(0);
        });

    function renderPage(index) {
        if (index < 0 || index >= pressData.length) return;
        currentIndex = index;
        const item = pressData[currentIndex];

        // 画像パス生成関数 (01_character_faceフォルダを参照)
        const getImg = (name) => `./01_character_face/${name}.webp?v=${ts}`;

        document.getElementById('paper').innerHTML = `
            <div style="text-align:right; font-size:0.9em;">Issue Date: ${item.date}</div>
            <h1 class="headline">${item.headline}</h1>
            <div class="match-area">
                <div class="boxer-card">
                    <img src="${getImg(item.left_boxer.name)}" onerror="this.src='./01_character_face/default.webp'">
                    <p><strong>${item.left_boxer.display_name}</strong></p>
                    <p>Accuracy: ${item.left_boxer.accuracy}</p>
                </div>
                <table class="stats-table">
                    <tr><td>VS</td></tr>
                    <tr><td>Punch Stats</td></tr>
                    <tr><td>${item.left_boxer.total_punches} <br> Total <br> ${item.right_boxer.total_punches}</td></tr>
                </table>
                <div class="boxer-card">
                    <img src="${getImg(item.right_boxer.name)}" onerror="this.src='./01_character_face/default.webp'">
                    <p><strong>${item.right_boxer.display_name}</strong></p>
                    <p>Accuracy: ${item.right_boxer.accuracy}</p>
                </div>
            </div>
            <div class="comment-box">
                <strong>Commentary:</strong><br>
                ${item.owner_comment}
            </div>
        `;
    }

    function changePage(dir) {
        const newIndex = currentIndex + dir;
        if (newIndex >= 0 && newIndex < pressData.length) {
            renderPage(newIndex);
        }
    }
</script>
</body>
</html>
