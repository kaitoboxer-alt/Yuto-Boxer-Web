<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>B.B.PW - Archive (The Last Bastion)</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); /* 小さな四角 */
            gap: 5px;
            padding: 20px;
            background: #000; /* 背景は黒で引き締める */
        }
        .archive-item {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border: 1px solid #333;
            transition: opacity 0.3s;
        }
        .archive-item:hover {
            opacity: 0.5; /* 消えゆくものの儚さ */
            border-color: #666;
        }
        .archive-item img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(50%); /* 少し色褪せた演出 */
        }
        .limit-info {
            color: #444; font-size: 0.7em; text-align: right; padding: 10px;
        }
    </style>
</head>
<body>
    <div class="limit-info">Capacity: <span id="count">0</span> / 100 (Disposable Archive)</div>
    <div class="archive-grid" id="archiveGrid">
        </div>

    <script>
        const ts = new Date().getTime();
        fetch(`./archive_data.json?v=${ts}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('count').innerText = data.length;
                const grid = document.getElementById('archiveGrid');
                data.forEach(item => {
                    grid.innerHTML += `
                        <div class="archive-item">
                            <img src="../03_gallery/${item.file}?v=${ts}" alt="archived">
                        </div>`;
                });
            });
    </script>
</body>
</html>
